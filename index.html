<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pagamento via PIX QRCODE</title>

  <!-- 🔥 PREVIEW WHATSAPP -->
  <meta property="og:title" content="Pagamento via PIX - Águas do Renascer">
  <meta property="og:description" content="Clique para pagar via PIX de forma rápida e segura">
  <meta property="og:image" content="https://raw.githubusercontent.com/renascerassociados-afk/pix/main/logo%20sf.png">
  <meta property="og:type" content="website">

  <!-- QR Code -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

  <!-- QRCode -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      max-width: 400px;
      margin: auto;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    /* 🔥 LOGO PEQUENA */
    .logo {
      width: 100px;
      height: auto;
      display: block;
      margin: 0 auto 15px;
    }

    textarea {
      width: 100%;
      height: 80px;
      margin-top: 10px;
      padding: 10px;
      font-size: 12px;
    }

    button {
      margin-top: 10px;
      padding: 12px;
      width: 100%;
      background: #00a650;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #qrcode {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- SUA LOGO -->
  <img src="https://raw.githubusercontent.com/renascerassociados-afk/pix/refs/heads/main/logo%20sf.png" class="logo">

  <h2>PAGUE VIA PIX PARA ÁGUAS DO RENASCER </h2>
  <p>Copie ou escaneie o QR Code</p>

  <textarea id="pixCode" readonly></textarea>

  <button onclick="copiar()">📋 Copiar código PIX</button>

  <div id="qrcode"></div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const pix = params.get("pix");

  const campo = document.getElementById("pixCode");

  if (pix) {
    campo.value = pix;

    // 🔥 GERA QR CODE
    new QRCode(document.getElementById("qrcode"), {
      text: pix,
      width: 200,
      height: 200
    });

  } else {
    campo.value = "Nenhum código PIX encontrado na URL.";
  }

  function copiar() {
    campo.select();
    document.execCommand("copy");
    alert("PIX copiado!");
  }
</script>

</body>
</html>
