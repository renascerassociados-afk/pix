<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pagamento via PIX</title>

  <!-- Biblioteca QR Code -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 20px;
    }

    .container {
      background: #ffffff;
      max-width: 400px;
      margin: auto;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }

    .logo {
      width: 20px;
      height: 20px;
      display: block;
      margin: 0 auto 15px;
    }

    h2 {
      margin-bottom: 10px;
      color: #333;
    }

    p {
      color: #666;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      height: 80px;
      margin-top: 12px;
      font-size: 12px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      resize: none;
    }

    button {
      margin-top: 12px;
      padding: 12px;
      width: 100%;
      background: #00a650;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #008f45;
    }

    #qrcode {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- 🔥 SUA IMAGEM -->
  <img src="https://raw.githubusercontent.com/renascerassociados-afk/pix/refs/heads/main/logo%20sf.png" class="logo">

  <h2>Pagamento via PIX</h2>
  <p>Copie o código ou escaneie o QR Code</p>

  <textarea id="pixCode" readonly></textarea>

  <button onclick="copiar()">📋 Copiar código PIX</button>

  <div id="qrcode"></div>

</div>

<script>
  function getPixFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get("pix");
  }

  const pix = getPixFromURL();

  if (pix) {
    document.getElementById("pixCode").value = pix;

    new QRCode(document.getElementById("qrcode"), {
      text: pix,
      width: 200,
      height: 200
    });
  } else {
    document.getElementById("pixCode").value = "Nenhum código PIX encontrado.";
  }

  function copiar() {
    const campo = document.getElementById("pixCode");
    campo.select();
    document.execCommand("copy");
    alert("Código PIX copiado!");
  }
</script>

</body>
</html>
