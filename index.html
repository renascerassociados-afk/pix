<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pagamento Pix</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  text-align: center;
  padding: 20px;
}

.container {
  background: white;
  max-width: 400px;
  margin: auto;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}

.logo {
  width: 120px;
  margin-bottom: 10px;
}

.valor {
  font-size: 28px;
  color: #ff6600;
  margin: 10px 0;
}

.qr {
  margin: 20px 0;
}

button {
  background: #00a884;
  color: white;
  border: none;
  padding: 15px;
  font-size: 16px;
  border-radius: 8px;
  width: 100%;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.info {
  font-size: 14px;
  color: #666;
  margin-top: 15px;
}
</style>

</head>
<body>

<div class="container">

  <!-- SUA LOGO -->
  <img src="https://via.placeholder.com/120x50?text=Sua+Logo" class="logo">

  <h3>Finalize seu pagamento</h3>

  <div class="valor" id="valor">R$ 0,00</div>

  <div class="qr">
    <img id="qrcode" width="200">
  </div>

  <button onclick="copiar()">📋 Copiar código Pix</button>

  <div class="info">
    Abra o app do seu banco e cole o código Pix para pagar.
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const pix = params.get("pix");
const valor = params.get("valor");

document.getElementById("valor").innerText = "R$ " + (valor || "0,00");

document.getElementById("qrcode").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(pix);

function copiar() {
  navigator.clipboard.writeText(pix);
  alert("Código Pix copiado!");
}
</script>

</body>
</html>
