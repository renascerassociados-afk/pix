<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pagamento via PIX</title>

  <!-- 🔥 PREVIEW WHATSAPP -->
  <meta property="og:title" content="Pagamento via PIX - Águas do Renascer">
  <meta property="og:description" content="Clique para pagar via PIX de forma rápida e segura">
  <meta property="og:image" content="https://raw.githubusercontent.com/renascerassociados-afk/pix/main/logo%20sf.png">
  <meta property="og:type" content="website">

  <!-- QR Code -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    .logo {
      width: 90px;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .pix-box {
      background: #f9fafb;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
      margin-bottom: 15px;
      word-break: break-all;
    }

    button {
      background: #16a34a;
      color: white;
      border: none;
      padding: 14px;
      width: 100%;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }

    button:hover {
      background: #15803d;
    }

    button:active {
      transform: scale(0.97);
    }

    .qr-box {
      margin-top: 20px;
      padding: 15px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    .success {
      margin-top: 10px;
      color: #16a34a;
      font-size: 13px;
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="https://raw.githubusercontent.com/renascerassociados-afk/pix/main/logo%20sf.png" class="logo">

  <h1>Pague via PIX</h1>
  <p class="subtitle">Águas do Renascer</p>

  <div class="pix-box" id="pixCode">
    Carregando código PIX...
  </div>

  <button onclick="copiar()">📋 Copiar código PIX</button>

  <div class="success" id="msg">✔ Código PIX copiado!</div>

  <div class="qr-box" id="qrcode"></div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const pix = params.get("pix");

  const campo = document.getElementById("pixCode");
  const msg = document.getElementById("msg");

  if (pix) {
    campo.innerText = pix;

    // 🔥 GERA QR CODE
    new QRCode(document.getElementById("qrcode"), {
      text: pix,
      width: 200,
      height: 200
    });

  } else {
    campo.innerText = "Nenhum código PIX encontrado na URL.";
  }

  function copiar() {
    navigator.clipboard.writeText(campo.innerText);

    msg.style.display = "block";

    setTimeout(() => {
      msg.style.display = "none";
    }, 2000);
  }
</script>

</body>
</html>
